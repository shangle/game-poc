<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Engine Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111827; color: white; font-family: sans-serif; touch-action: none; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #111827; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .palette-item { border: 2px solid transparent; cursor: pointer; transition: all 0.1s; }
        .palette-item.selected { border-color: #fff; transform: scale(1.05); outline: 2px solid #3b82f6; }
        
        .grid-cell { width: 22px; height: 22px; border: 1px solid #374151; cursor: pointer; }
        .grid-cell:hover { opacity: 0.8; border-color: white; }
        
        #game-container { position: absolute; top:0; left:0; width: 100%; height: 100%; background: #000; z-index: 10; display: none;}
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; } #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        
        #weapon-container { position: absolute; bottom: -10%; left: 50%; transform: translateX(-50%); width: 400px; height: 400px; pointer-events: none; transition: transform 0.1s; z-index: 15; }
        #weapon-img { width: 100%; height: 100%; object-fit: contain; }
        .firing { transform: translateX(-50%) translateY(30px) rotate(-5deg) !important; }
        
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; display: none; }
        #hud { position: absolute; bottom: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #fff; pointer-events: none; z-index: 20; text-shadow: 2px 2px 0 #000; }

        .fullscreen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 50; background-size: cover; background-position: center; text-align: center; }
        #boot-screen { background-color: #0f172a; z-index: 100; }
        #win-screen, #death-screen { display: none; }
        #win-screen { background-color: rgba(0, 50, 0, 0.9); }
        #death-screen { background-color: rgba(50, 0, 0, 0.9); }
        .title-text { font-size: 5rem; font-weight: 900; text-transform: uppercase; text-shadow: 4px 4px 0 #000; margin-bottom: 1rem; color: white; letter-spacing: 2px; }

        /* Mobile Controls */
        .unselectable { user-select: none; -webkit-user-select: none; }
        #mobile-controls { display: none; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <!-- BOOT SCREEN -->
    <div id="boot-screen" class="fullscreen-overlay">
        <div class="bg-black/60 p-12 rounded-2xl border-4 border-gray-700 backdrop-blur-sm">
            <h1 id="boot-title" class="title-text text-blue-400">RETRO ENGINE</h1>
            <p class="text-xl text-gray-300 mb-8 font-bold">Game Creator Studio & Player</p>
            
            <div class="flex flex-col md:flex-row gap-6 justify-center">
                <button onclick="playDemo()" class="bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-xl font-black text-2xl shadow-[0_6px_0_#166534] active:translate-y-[6px] active:shadow-none transition-all">
                    ► PLAY DEMO GAME
                </button>
                <button onclick="openEditor()" class="bg-gray-700 hover:bg-gray-600 text-white px-8 py-4 rounded-xl font-black text-2xl shadow-[0_6px_0_#374151] active:translate-y-[6px] active:shadow-none transition-all border-2 border-gray-500">
                    ⚙️ ENTER BUILDER
                </button>
            </div>
        </div>
    </div>

    <!-- EDITOR UI -->
    <div id="editor-sidebar" class="w-full md:w-[450px] h-screen bg-gray-900 border-r border-gray-700 flex flex-col z-40 hidden">
        <div class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">Engine Builder</h1>
            <button onclick="startGameEngine()" class="bg-green-600 hover:bg-green-500 px-4 py-1 rounded font-bold shadow">► TEST</button>
        </div>

        <div class="flex border-b border-gray-700 text-sm bg-gray-800">
            <button onclick="switchTab('map')" id="tab-map" class="flex-1 py-3 font-semibold tab-btn active">Map Editor</button>
            <button onclick="switchTab('assets')" id="tab-assets" class="flex-1 py-3 font-semibold tab-btn text-gray-400">Assets & DB</button>
            <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-3 font-semibold tab-btn text-gray-400">Project</button>
        </div>

        <!-- TAB: MAP -->
        <div id="content-map" class="p-4 flex-1 flex flex-col overflow-hidden">
            <!-- Layer Toggles -->
            <div class="flex gap-2 mb-3 bg-gray-800 p-2 rounded-lg justify-center">
                <button onclick="setLayer('entities')" id="btn-layer-entities" class="px-3 py-1 rounded font-bold text-xs bg-blue-600 text-white">Entities</button>
                <button onclick="setLayer('floors')" id="btn-layer-floors" class="px-3 py-1 rounded font-bold text-xs bg-gray-700 text-gray-300">Floors</button>
                <button onclick="setLayer('ceils')" id="btn-layer-ceils" class="px-3 py-1 rounded font-bold text-xs bg-gray-700 text-gray-300">Ceilings</button>
            </div>

            <div class="bg-gray-800 p-3 rounded-lg mb-3 shadow-inner min-h-[80px]">
                <h3 class="text-xs font-bold text-gray-400 mb-2" id="palette-title">Palette (Entities)</h3>
                <div id="palette-container" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="bg-gray-800 p-4 rounded-lg shadow-lg flex flex-col items-center flex-1 overflow-auto">
                <div class="w-full flex justify-between items-center mb-2">
                    <span class="text-sm font-bold text-gray-300" id="grid-label">Painting: Entities</span>
                    <button onclick="fillMap()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">Fill Layer</button>
                </div>
                <div id="grid-container" class="grid bg-gray-900 border-2 border-gray-700 touch-none mx-auto"></div>
            </div>
        </div>

        <!-- TAB: ASSETS DB -->
        <div id="content-assets" class="p-4 flex-1 hidden overflow-y-auto space-y-4">
            <p class="text-xs text-gray-400">Manage all unlimited custom types here.</p>
            
            <div id="db-categories" class="space-y-4 pb-10">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- TAB: SETTINGS -->
        <div id="content-settings" class="p-4 flex-1 hidden overflow-y-auto space-y-6">
            <div class="bg-gray-800 p-4 rounded-lg space-y-3">
                <h3 class="text-sm font-bold text-blue-400">Game Meta</h3>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">Game Title</label>
                    <input type="text" id="game-title-input" class="w-full bg-gray-700 rounded px-3 py-2 text-white font-bold" oninput="updateSettings()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">Start Screen URL</label>
                    <input type="text" id="game-start-bg" class="w-full bg-gray-700 rounded px-3 py-2 text-white placeholder-gray-500" placeholder="Background image URL" oninput="updateSettings()">
                </div>
            </div>

            <div class="bg-gray-800 p-4 rounded-lg space-y-3">
                <h3 class="text-sm font-bold text-green-400">Save & Share</h3>
                <button onclick="downloadGame()" class="w-full bg-gray-700 hover:bg-gray-600 p-3 rounded font-bold flex justify-center gap-2">💾 Save Project (.json)</button>
                <div class="relative">
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importGame(event)">
                    <button onclick="document.getElementById('import-file').click()" class="w-full bg-gray-700 hover:bg-gray-600 p-3 rounded font-bold flex justify-center gap-2">📂 Open Project</button>
                </div>
                <button onclick="generateShareURL()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded font-bold flex justify-center gap-2 mt-2">🔗 Copy Playable Link</button>
                <p id="share-feedback" class="text-green-400 text-xs font-bold text-center hidden">Copied to Clipboard!</p>
            </div>
        </div>
    </div>

    <!-- GAME VIEWPORT -->
    <div id="game-container">
        <div id="crosshair"></div>
        <div id="weapon-container"><img id="weapon-img" src="" alt="weapon"></div>
        <div id="hud">
            <div class="text-red-500">HP: <span id="hp-display">100</span></div>
            <div class="text-yellow-400 text-lg">SCORE: <span id="score-display">0</span></div>
        </div>
        <div id="flash"></div>

        <div id="mobile-controls" class="absolute bottom-6 left-2 right-6 z-20 pointer-events-none unselectable">
            <div class="flex justify-between items-end w-full h-full">
                <div class="grid grid-cols-3 gap-1 pointer-events-auto opacity-70">
                    <div></div><button id="btn-w" class="w-14 h-14 bg-gray-700 rounded-lg active:bg-gray-500 text-white font-bold text-2xl pb-1">↑</button><div></div>
                    <button id="btn-a" class="w-14 h-14 bg-gray-700 rounded-lg active:bg-gray-500 text-white font-bold text-2xl pr-1">←</button>
                    <button id="btn-s" class="w-14 h-14 bg-gray-700 rounded-lg active:bg-gray-500 text-white font-bold text-2xl pt-1">↓</button>
                    <button id="btn-d" class="w-14 h-14 bg-gray-700 rounded-lg active:bg-gray-500 text-white font-bold text-2xl pl-1">→</button>
                </div>
                <button id="btn-fire" class="w-20 h-20 bg-red-600/80 rounded-full active:bg-red-400 text-white font-bold pointer-events-auto border-4 border-red-800 shadow-lg mb-2">FIRE</button>
            </div>
        </div>
        
        <button id="btn-pause" onclick="stopGame()" class="absolute top-4 right-4 bg-gray-800 border-2 border-gray-600 text-white px-4 py-2 rounded font-bold z-20 pointer-events-auto hidden unselectable">EDIT (PAUSE)</button>

        <div id="win-screen" class="fullscreen-overlay">
            <h1 class="title-text text-green-400">LEVEL CLEAR</h1>
            <p class="text-2xl text-yellow-400 mb-8 font-bold">Final Score: <span id="final-score">0</span></p>
            <button onclick="stopGame()" class="bg-white text-green-900 px-8 py-4 rounded-xl font-bold cursor-pointer pointer-events-auto text-xl">Back to Menu</button>
        </div>
        
        <div id="death-screen" class="fullscreen-overlay">
            <h1 class="title-text text-red-500">YOU DIED</h1>
            <button onclick="startGameEngine()" class="bg-red-700 text-white px-8 py-4 rounded-xl font-bold mt-4 cursor-pointer pointer-events-auto border-2 border-red-400 text-xl shadow-[0_6px_0_#7f1d1d] active:translate-y-[6px] active:shadow-none">Try Again</button>
            <button onclick="stopGame()" class="mt-8 text-sm text-gray-400 underline cursor-pointer pointer-events-auto">Return to Builder</button>
        </div>
    </div>

<script>
/**
 * ASSET GENERATOR (Canvas based fail-safes)
 */
function createAsset(type) {
    const c = document.createElement('canvas'); const ctx = c.getContext('2d');
    c.width = 64; c.height = 64;
    
    if(type.startsWith('wall')) {
        ctx.fillStyle = type==='wall1'?'#4a5568':'#2b6cb0'; ctx.fillRect(0,0,64,64);
        ctx.fillStyle = type==='wall1'?'#2d3748':'#2c5282';
        for(let i=0; i<64; i+=16) for(let j=0; j<64; j+=8) if(!((j/8)%2===0 && i%32===0)) ctx.fillRect(i+1, j+1, 14, 6);
    } else if(type.startsWith('floor')) {
        ctx.fillStyle = type==='floor1'?'#2d3748':'#486581'; ctx.fillRect(0,0,64,64);
        ctx.fillStyle = type==='floor1'?'#1a202c':'#334e68'; ctx.fillRect(0,0,32,32); ctx.fillRect(32,32,32,32);
    } else if(type.startsWith('ceil')) {
        ctx.fillStyle = type==='ceil1'?'#111827':'#3f2020'; ctx.fillRect(0,0,64,64);
        if(type==='ceil1') { ctx.fillStyle='#fff'; ctx.fillRect(10,10,2,2); ctx.fillRect(40,50,2,2); ctx.fillRect(50,20,2,2); }
    } else if(type==='goal') {
        ctx.fillStyle = '#22c55e'; ctx.fillRect(0,0,64,64); ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.fillText('EXIT', 12, 38);
    } else if(type.startsWith('enemy')) {
        c.width=128; c.height=128; ctx.fillStyle = type==='enemy1'?'#ef4444':'#a855f7';
        ctx.beginPath(); ctx.arc(64,64,40,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#000'; ctx.fillRect(45,50,15,15); ctx.fillRect(70,50,15,15);
        ctx.fillStyle='#fff'; ctx.fillRect(50,80,28,10);
    } else if(type.startsWith('obj')) { // Barrel
        c.width=128; c.height=128; ctx.fillStyle = '#92400e'; ctx.fillRect(34, 20, 60, 88);
        ctx.fillStyle = '#000'; ctx.fillRect(34, 30, 60, 5); ctx.fillRect(34, 90, 60, 5);
    } else if(type.startsWith('item')) {
        c.width=128; c.height=128; 
        if(type==='item_hp') { ctx.fillStyle='#ef4444'; ctx.beginPath(); ctx.arc(64,80,30,0,Math.PI*2); ctx.fill(); ctx.fillRect(54,30,20,40); }
        else { ctx.fillStyle='#eab308'; ctx.beginPath(); ctx.arc(64,64,30,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#000'; ctx.font='bold 40px Arial'; ctx.fillText('$', 52, 78); }
    } else if (type === 'gun') {
        c.width = 256; c.height = 256; ctx.fillStyle = '#374151'; ctx.fillRect(100, 150, 56, 150); 
        ctx.fillStyle = '#6b7280'; ctx.fillRect(115, 50, 26, 150); ctx.fillStyle = '#000'; ctx.fillRect(123, 40, 10, 20); 
    }
    return c.toDataURL('image/png');
}

/**
 * GAME STATE & DATA ARCHITECTURE
 */
const GRID_SIZE = 14;
const ID_EMPTY = 0; const ID_PLAYER = 99; const ID_GOAL = 98;

let gameData = {
    title: "MY RETRO ADVENTURE",
    startBg: "",
    assets: { gun: createAsset('gun') },
    palette: {
        floors:  [{ id: 101, name: "Grey Tile", tex: "floor1", color: "#4b5563" }],
        ceils:   [{ id: 201, name: "Starry Night", tex: "ceil1", color: "#1f2937" }],
        walls:   [{ id: 1, name: "Brick Wall", tex: "wall1", color: "#9ca3af" }],
        enemies: [{ id: 10, name: "Grunt", tex: "enemy1", hp: 100, speed: 0.05, color: "#ef4444" }],
        objects: [{ id: 20, name: "Barrel", tex: "obj1", color: "#b45309" }],
        items:   [{ id: 30, name: "Health Potion", tex: "item_hp", type: "hp", value: 50, color: "#10b981" },
                  { id: 31, name: "Gold Coin", tex: "item_coin", type: "score", value: 100, color: "#eab308" }]
    },
    map: {
        floors: Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(101)),
        ceils:  Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(201)),
        entities: Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0))
    }
};

let activeLayer = 'entities'; 
let currentPaintId = 1;

function initDemoMap() {
    // Border walls
    for(let i=0; i<GRID_SIZE; i++) {
        gameData.map.entities[0][i] = 1; gameData.map.entities[GRID_SIZE-1][i] = 1;
        gameData.map.entities[i][0] = 1; gameData.map.entities[i][GRID_SIZE-1] = 1;
    }
    gameData.map.entities[GRID_SIZE-2][GRID_SIZE-2] = ID_PLAYER; // Start bottom right
    gameData.map.entities[1][1] = ID_GOAL; // Exit top left
    
    // Some maze/objects
    gameData.map.entities[5][5] = 1; gameData.map.entities[5][6] = 1; gameData.map.entities[5][7] = 1;
    gameData.map.entities[10][3] = 20; gameData.map.entities[10][4] = 20; // Barrels
    gameData.map.entities[3][10] = 10; gameData.map.entities[8][2] = 10; // Enemies
    
    gameData.map.entities[11][5] = 31; gameData.map.entities[11][6] = 31; // Coins
    gameData.map.entities[2][2] = 30; // Potion near exit
}

// Preload Procedural Assets directly into gameData if empty
function resolveAsset(texKey) {
    if(gameData.assets[texKey]) return gameData.assets[texKey];
    const generated = createAsset(texKey);
    gameData.assets[texKey] = generated;
    return generated;
}

/**
 * UI CONTROLLERS
 */
function playDemo() {
    initDemoMap();
    document.getElementById('boot-screen').style.display = 'none';
    startGameEngine();
}

function openEditor() {
    initDemoMap();
    document.getElementById('boot-screen').style.display = 'none';
    document.getElementById('editor-sidebar').classList.remove('hidden');
    renderUI();
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-gray-400'); });
    document.querySelectorAll('[id^="content-"]').forEach(c => c.classList.add('hidden'));
    document.getElementById('tab-'+tabId).classList.add('active');
    document.getElementById('tab-'+tabId).classList.remove('text-gray-400');
    document.getElementById('content-'+tabId).classList.remove('hidden');
}

function setLayer(layer) {
    activeLayer = layer;
    document.querySelectorAll('[id^="btn-layer-"]').forEach(b => {
        b.classList.remove('bg-blue-600', 'text-white');
        b.classList.add('bg-gray-700', 'text-gray-300');
    });
    const activeBtn = document.getElementById('btn-layer-'+layer);
    activeBtn.classList.remove('bg-gray-700', 'text-gray-300');
    activeBtn.classList.add('bg-blue-600', 'text-white');
    
    document.getElementById('grid-label').innerText = "Painting: " + layer.charAt(0).toUpperCase() + layer.slice(1);
    
    // Set default paint brush based on layer
    if(layer === 'floors' && gameData.palette.floors.length) setPaint(gameData.palette.floors[0].id);
    else if(layer === 'ceils' && gameData.palette.ceils.length) setPaint(gameData.palette.ceils[0].id);
    else if(layer === 'entities' && gameData.palette.walls.length) setPaint(gameData.palette.walls[0].id);
    else setPaint(ID_EMPTY);

    renderPalette();
    renderGrid();
}

function setPaint(id) { currentPaintId = id; renderPalette(); }

function renderPalette() {
    let html = `<div class="palette-item p-1 px-2 rounded flex items-center gap-2 ${currentPaintId===ID_EMPTY?'selected':''}" onclick="setPaint(${ID_EMPTY})">
        <div class="w-4 h-4 bg-gray-900 border border-gray-600"></div><span class="text-xs">Erase</span>
    </div>`;

    if(activeLayer === 'entities') {
        html += `<div class="palette-item p-1 px-2 rounded flex items-center gap-2 ${currentPaintId===ID_PLAYER?'selected':''}" onclick="setPaint(${ID_PLAYER})">
            <div class="w-4 h-4 bg-blue-500 rounded-full border border-white"></div><span class="text-xs font-bold text-blue-400">P. Start</span>
        </div>`;
        html += `<div class="palette-item p-1 px-2 rounded flex items-center gap-2 ${currentPaintId===ID_GOAL?'selected':''}" onclick="setPaint(${ID_GOAL})">
            <div class="w-4 h-4 bg-green-500 border border-white"></div><span class="text-xs font-bold text-green-400">Exit Goal</span>
        </div>`;
        
        const renderGroup = (arr, isCircle) => {
            arr.forEach(i => {
                html += `<div class="palette-item p-1 px-2 rounded flex items-center gap-2 ${currentPaintId===i.id?'selected':''}" onclick="setPaint(${i.id})">
                    <div class="w-4 h-4 ${isCircle?'rounded-full':''}" style="background-color: ${i.color}"></div><span class="text-xs">${i.name}</span>
                </div>`;
            });
        };
        renderGroup(gameData.palette.walls, false);
        renderGroup(gameData.palette.enemies, true);
        renderGroup(gameData.palette.objects, true);
        renderGroup(gameData.palette.items, true);
        document.getElementById('palette-title').innerText = "Palette (Entities & Logic)";
    } 
    else if (activeLayer === 'floors') {
        gameData.palette.floors.forEach(i => {
            html += `<div class="palette-item p-1 px-2 rounded flex items-center gap-2 ${currentPaintId===i.id?'selected':''}" onclick="setPaint(${i.id})">
                <div class="w-4 h-4 border border-gray-500" style="background-color: ${i.color}"></div><span class="text-xs">${i.name}</span>
            </div>`;
        });
        document.getElementById('palette-title').innerText = "Palette (Floor Textures)";
    }
    else if (activeLayer === 'ceils') {
        gameData.palette.ceils.forEach(i => {
            html += `<div class="palette-item p-1 px-2 rounded flex items-center gap-2 ${currentPaintId===i.id?'selected':''}" onclick="setPaint(${i.id})">
                <div class="w-4 h-4 border border-gray-500" style="background-color: ${i.color}"></div><span class="text-xs">${i.name}</span>
            </div>`;
        });
        document.getElementById('palette-title').innerText = "Palette (Ceiling Textures)";
    }

    document.getElementById('palette-container').innerHTML = html;
}

function renderGrid() {
    const container = document.getElementById('grid-container');
    container.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
    container.innerHTML = '';
    
    let isDrawing = false;
    container.onpointerdown = () => isDrawing = true;
    window.onpointerup = () => isDrawing = false;

    for(let z=0; z<GRID_SIZE; z++) {
        for(let x=0; x<GRID_SIZE; x++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell relative';
            
            // Background color is Floor/Ceil based on layer. If Entities layer, show floor as faint background.
            const floorId = gameData.map.floors[z][x];
            const ceilId = gameData.map.ceils[z][x];
            const entId = gameData.map.entities[z][x];

            // Render Base Color
            if(activeLayer === 'ceils') {
                const cObj = gameData.palette.ceils.find(i=>i.id===ceilId);
                cell.style.backgroundColor = cObj ? cObj.color : '#000';
            } else {
                const fObj = gameData.palette.floors.find(i=>i.id===floorId);
                cell.style.backgroundColor = fObj ? fObj.color : '#000';
                if(activeLayer === 'entities') cell.style.opacity = '0.7'; // Dim floor to see entities better
            }

            // Render Entity Icon on top
            if(activeLayer === 'entities' && entId !== ID_EMPTY) {
                const entMarker = document.createElement('div');
                entMarker.className = 'absolute inset-0 m-auto';
                
                if(entId === ID_PLAYER) { entMarker.className += ' w-4 h-4 bg-blue-500 rounded-full border-2 border-white'; }
                else if(entId === ID_GOAL) { entMarker.className += ' w-4 h-4 bg-green-500 border-2 border-white'; }
                else {
                    let eObj = gameData.palette.walls.find(i=>i.id===entId) || 
                               gameData.palette.enemies.find(i=>i.id===entId) || 
                               gameData.palette.objects.find(i=>i.id===entId) || 
                               gameData.palette.items.find(i=>i.id===entId);
                    if(eObj) {
                        entMarker.style.backgroundColor = eObj.color;
                        entMarker.style.width = '80%'; entMarker.style.height = '80%';
                        if(!gameData.palette.walls.find(i=>i.id===entId)) entMarker.style.borderRadius = '50%'; // Sprites are circles
                    }
                }
                cell.appendChild(entMarker);
            }

            const paint = (e) => {
                e.preventDefault();
                if(activeLayer === 'entities') {
                    if(currentPaintId === ID_PLAYER || currentPaintId === ID_GOAL) {
                        // Enforce unique
                        for(let r=0; r<GRID_SIZE; r++) for(let c=0; c<GRID_SIZE; c++) 
                            if(gameData.map.entities[r][c] === currentPaintId) gameData.map.entities[r][c] = 0;
                    }
                    gameData.map.entities[z][x] = currentPaintId;
                } 
                else if (activeLayer === 'floors') gameData.map.floors[z][x] = currentPaintId;
                else if (activeLayer === 'ceils') gameData.map.ceils[z][x] = currentPaintId;
                renderGrid();
            };

            cell.onpointerdown = paint;
            cell.onpointerenter = (e) => { if(isDrawing) paint(e); };
            container.appendChild(cell);
        }
    }
}

function fillMap() {
    for(let z=0; z<GRID_SIZE; z++) {
        for(let x=0; x<GRID_SIZE; x++) {
            if(activeLayer === 'entities') gameData.map.entities[z][x] = currentPaintId;
            if(activeLayer === 'floors') gameData.map.floors[z][x] = currentPaintId;
            if(activeLayer === 'ceils') gameData.map.ceils[z][x] = currentPaintId;
        }
    }
    renderGrid();
}

/**
 * DB ASSET MANAGER UI
 */
function updateDBItem(category, id, key, val) {
    const item = gameData.palette[category].find(x => x.id === id);
    if(item) { item[key] = (key==='hp'||key==='speed'||key==='value')?Number(val):val; }
    renderPalette(); renderGrid();
}

function addDBItem(category) {
    const maxIdStr = category.substring(0, 3).toUpperCase(); // Hack to ensure unique ranges per category isn't strictly needed if we just Math.max all IDs.
    // Let's just find true max globally to be safe
    let maxId = 10;
    ['floors','ceils','walls','enemies','objects','items'].forEach(c => {
        gameData.palette[c].forEach(i => maxId = Math.max(maxId, i.id));
    });
    const id = maxId + 1;
    
    let base = { id, name: "New " + category, tex: category + "_" + id, color: "#ffffff" };
    if(category === 'enemies') base = { ...base, hp: 100, speed: 0.05 };
    if(category === 'items') base = { ...base, type: 'score', value: 50 };
    
    gameData.palette[category].push(base);
    renderDB(); renderPalette();
}

function renderDB() {
    let html = `
        <div class="bg-gray-800 p-3 rounded"><h4 class="text-xs font-bold text-gray-400 mb-2">Global Weapon</h4>
        <input type="text" value="${gameData.assets.gun || ''}" placeholder="Gun Sprite URL" onchange="gameData.assets.gun=this.value" class="w-full bg-gray-700 text-xs px-2 py-1 rounded text-white mb-1"></div>
    `;

    const buildCat = (catName, title, extraHTMLFn) => {
        let catHtml = `<div class="bg-gray-800 p-3 rounded"><h4 class="text-xs font-bold text-gray-400 mb-2 flex justify-between">${title} <button onclick="addDBItem('${catName}')" class="text-blue-400 hover:text-white">+</button></h4><div class="space-y-2">`;
        gameData.palette[catName].forEach(i => {
            if(!gameData.assets[i.tex]) gameData.assets[i.tex] = ""; // init
            catHtml += `<div class="bg-gray-900 p-2 rounded">
                <div class="flex gap-2 items-center mb-1">
                    <input type="color" value="${i.color}" onchange="updateDBItem('${catName}', ${i.id}, 'color', this.value)" class="w-6 h-6 cursor-pointer">
                    <input type="text" value="${i.name}" onchange="updateDBItem('${catName}', ${i.id}, 'name', this.value)" class="flex-1 bg-gray-700 text-xs px-2 py-1 rounded text-white">
                </div>
                <input type="text" value="${gameData.assets[i.tex]}" placeholder="Texture/Sprite URL" onchange="gameData.assets['${i.tex}']=this.value" class="w-full bg-gray-700 text-xs px-2 py-1 rounded text-white mb-1">
                ${extraHTMLFn ? extraHTMLFn(i) : ''}
            </div>`;
        });
        return catHtml + `</div></div>`;
    };

    html += buildCat('walls', 'Walls (Blocks)', null);
    html += buildCat('floors', 'Floors', null);
    html += buildCat('ceils', 'Ceilings', null);
    html += buildCat('objects', 'Objects (Solid)', null);
    
    html += buildCat('enemies', 'Enemies (Hostile)', (i) => `
        <div class="flex gap-2 text-xs text-gray-400">
            HP: <input type="number" value="${i.hp}" onchange="updateDBItem('enemies', ${i.id}, 'hp', this.value)" class="w-16 bg-gray-700 px-1 py-1 rounded text-white">
            Spd: <input type="number" step="0.01" value="${i.speed}" onchange="updateDBItem('enemies', ${i.id}, 'speed', this.value)" class="w-16 bg-gray-700 px-1 py-1 rounded text-white">
        </div>`);
        
    html += buildCat('items', 'Items (Collectible)', (i) => `
        <div class="flex gap-2 text-xs text-gray-400 items-center">
            Effect: <select onchange="updateDBItem('items', ${i.id}, 'type', this.value)" class="bg-gray-700 px-1 py-1 rounded text-white">
                <option value="score" ${i.type==='score'?'selected':''}>Score</option><option value="hp" ${i.type==='hp'?'selected':''}>Heal (HP)</option>
            </select>
            Val: <input type="number" value="${i.value}" onchange="updateDBItem('items', ${i.id}, 'value', this.value)" class="w-16 bg-gray-700 px-1 py-1 rounded text-white">
        </div>`);

    document.getElementById('db-categories').innerHTML = html;
}

function updateSettings() {
    gameData.title = document.getElementById('game-title-input').value || "MY RETRO ADVENTURE";
    gameData.startBg = document.getElementById('game-start-bg').value;
    document.getElementById('boot-title').innerText = gameData.title;
    if(gameData.startBg) document.getElementById('boot-screen').style.backgroundImage = `url(${gameData.startBg})`;
    else document.getElementById('boot-screen').style.backgroundImage = 'none';
}

function renderUI() {
    setLayer('entities');
    renderDB();
    document.getElementById('game-title-input').value = gameData.title;
    document.getElementById('game-start-bg').value = gameData.startBg || "";
    updateSettings();
}

/**
 * EXPORT / IMPORT
 */
function downloadGame() {
    const a = document.createElement('a');
    a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(gameData));
    a.download = gameData.title.replace(/\s+/g, '_') + ".json";
    document.body.appendChild(a); a.click(); a.remove();
}

function importGame(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try { gameData = JSON.parse(e.target.result); renderUI(); alert("Game Loaded!"); } 
        catch(err) { alert("Invalid game file."); }
    };
    reader.readAsText(file);
}

function generateShareURL() {
    try {
        const b64 = btoa(encodeURIComponent(JSON.stringify(gameData)));
        window.location.hash = b64;
        navigator.clipboard.writeText(window.location.href).then(() => {
            const f = document.getElementById('share-feedback'); f.classList.remove('hidden'); setTimeout(() => f.classList.add('hidden'), 3000);
        }).catch(e => alert("Please copy URL manually from address bar."));
    } catch(e) { alert("Game data too large for URL link. Use Save Project instead."); }
}

if(window.location.hash) {
    try {
        const b64 = window.location.hash.substring(1);
        gameData = JSON.parse(decodeURIComponent(atob(b64)));
        // Auto boot directly to play mode if loaded via URL
        setTimeout(() => { document.getElementById('boot-screen').style.display='none'; startGameEngine(); }, 500);
    } catch(e) { console.error("Could not load from URL"); }
}

/**
 * THREE.JS GAME ENGINE
 */
const TILE_SIZE = 10; const WALL_HEIGHT = 10;
let scene, camera, renderer, animationFrameId;
let colliders = [], enemies = [], items = [], goalMesh = null;
let gameActive = false;
let playerStats = { hp: 100, score: 0 };
let cachedMaterials = {};

function getMaterial(texKey, isSprite=false) {
    if(!cachedMaterials[texKey]) {
        const tex = new THREE.TextureLoader().load(resolveAsset(texKey));
        tex.magFilter = THREE.NearestFilter; // Retro Pixel style
        if(!isSprite) { // Block
            cachedMaterials[texKey] = new THREE.MeshLambertMaterial({ map: tex });
        } else { // Sprite
            cachedMaterials[texKey] = new THREE.SpriteMaterial({ map: tex, color: 0xffffff });
        }
    }
    return cachedMaterials[texKey];
}

function init3D() {
    const container = document.getElementById('game-container');
    container.style.display = 'block';
    
    if(!renderer) {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0x000000); scene.fog = new THREE.Fog(0x000000, 10, 80); 
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: false }); 
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.insertBefore(renderer.domElement, container.firstChild);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const pointLight = new THREE.PointLight(0xffffff, 0.8, 50); camera.add(pointLight); scene.add(camera);
        
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight);
        });
    }
}

function buildWorld() {
    cachedMaterials = {}; 
    scene.children = scene.children.filter(c => c.type === 'AmbientLight' || c.type === 'PerspectiveCamera');
    colliders = []; enemies = []; items = []; goalMesh = null;
    playerStats = { hp: 100, score: 0 }; updateHUD();
    document.getElementById('weapon-img').src = resolveAsset('gun');

    const planeGeo = new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE);
    const boxGeo = new THREE.BoxGeometry(TILE_SIZE, WALL_HEIGHT, TILE_SIZE);

    let playerSet = false;

    // Loop through grid to build layers
    for(let z = 0; z < GRID_SIZE; z++) {
        for(let x = 0; x < GRID_SIZE; x++) {
            const posX = x * TILE_SIZE; const posZ = z * TILE_SIZE;

            // 1. FLOOR
            const fId = gameData.map.floors[z][x];
            if(fId !== ID_EMPTY) {
                const fData = gameData.palette.floors.find(i=>i.id===fId);
                if(fData) {
                    const mesh = new THREE.Mesh(planeGeo, getMaterial(fData.tex, false));
                    mesh.rotation.x = -Math.PI / 2; mesh.position.set(posX, 0, posZ); scene.add(mesh);
                }
            }

            // 2. CEILING
            const cId = gameData.map.ceils[z][x];
            if(cId !== ID_EMPTY) {
                const cData = gameData.palette.ceils.find(i=>i.id===cId);
                if(cData) {
                    const mesh = new THREE.Mesh(planeGeo, getMaterial(cData.tex, false));
                    mesh.rotation.x = Math.PI / 2; mesh.position.set(posX, WALL_HEIGHT, posZ); scene.add(mesh);
                }
            }

            // 3. ENTITIES
            const eId = gameData.map.entities[z][x];
            if(eId === ID_PLAYER) { 
                camera.position.set(posX, WALL_HEIGHT/2, posZ); playerSet = true;
            } 
            else if(eId === ID_GOAL) {
                goalMesh = new THREE.Sprite(getMaterial('goal', true));
                goalMesh.scale.set(8, 8, 1); goalMesh.position.set(posX, 4, posZ); scene.add(goalMesh);
            } 
            else {
                // Find what this ID is
                const wData = gameData.palette.walls.find(i=>i.id===eId);
                const enData = gameData.palette.enemies.find(i=>i.id===eId);
                const oData = gameData.palette.objects.find(i=>i.id===eId);
                const iData = gameData.palette.items.find(i=>i.id===eId);

                if(wData) { // Solid Wall Block
                    const mesh = new THREE.Mesh(boxGeo, getMaterial(wData.tex, false));
                    mesh.position.set(posX, WALL_HEIGHT/2, posZ); scene.add(mesh);
                    colliders.push({ type: 'box', x: posX, z: posZ, size: TILE_SIZE });
                } 
                else if(enData) { // Moving Enemy
                    const sprite = new THREE.Sprite(getMaterial(enData.tex, true));
                    sprite.scale.set(6, 6, 1); sprite.position.set(posX, 3, posZ); scene.add(sprite);
                    enemies.push({ mesh: sprite, hp: enData.hp, speed: enData.speed, active: true });
                }
                else if(oData) { // Solid Object (Sprite)
                    const sprite = new THREE.Sprite(getMaterial(oData.tex, true));
                    sprite.scale.set(7, 7, 1); sprite.position.set(posX, 3.5, posZ); scene.add(sprite);
                    colliders.push({ type: 'circle', x: posX, z: posZ, radius: 3.5 });
                }
                else if(iData) { // Collectible Item
                    const sprite = new THREE.Sprite(getMaterial(iData.tex, true));
                    sprite.scale.set(4, 4, 1); sprite.position.set(posX, 2, posZ); scene.add(sprite);
                    items.push({ mesh: sprite, type: iData.type, value: iData.value, active: true, base_y: 2 });
                }
            }
        }
    }
    if(!playerSet) camera.position.set(TILE_SIZE, WALL_HEIGHT/2, TILE_SIZE);
}

/**
 * ENGINE LOGIC & CONTROLS
 */
const keys = { w: false, a: false, s: false, d: false };
const velocity = new THREE.Vector3(); let euler = new THREE.Euler(0, 0, 0, 'YXZ');
const isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
const container = document.getElementById('game-container');

document.addEventListener('keydown', (e) => { if(gameActive) keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', (e) => { if(gameActive) keys[e.key.toLowerCase()] = false; });

function startGameEngine() {
    init3D(); buildWorld();
    gameActive = true;
    document.getElementById('editor-sidebar').classList.add('hidden');
    document.querySelectorAll('.fullscreen-overlay').forEach(el => el.style.display = 'none');
    
    if (isTouchDevice) document.getElementById('mobile-controls').style.display = 'block';
    else { try { container.requestPointerLock(); } catch(e) {} }
    
    document.getElementById('btn-pause').style.display = 'block';
    if (!animationFrameId) gameLoop();
}

function stopGame() {
    gameActive = false;
    document.getElementById('game-container').style.display = 'none';
    document.getElementById('btn-pause').style.display = 'none';
    document.getElementById('mobile-controls').style.display = 'none';
    
    if (document.pointerLockElement) document.exitPointerLock();
    if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
    
    // Return to boot or editor
    document.querySelectorAll('.fullscreen-overlay').forEach(el => el.style.display = 'none');
    document.getElementById('editor-sidebar').classList.remove('hidden');
    renderUI();
}

// Mouse/Touch Look logic
document.addEventListener('pointerlockchange', () => { if (!document.pointerLockElement && gameActive && !isTouchDevice) stopGame(); });
document.addEventListener('mousemove', (event) => {
    if (gameActive && document.pointerLockElement === container) {
        euler.setFromQuaternion(camera.quaternion);
        euler.y -= (event.movementX || 0) * 0.002; euler.x -= (event.movementY || 0) * 0.002;
        euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x)); 
        camera.quaternion.setFromEuler(euler);
    }
});

let touchStartX = 0, touchStartY = 0;
container.addEventListener('touchstart', (e) => {
    if(!gameActive || e.target.tagName === 'BUTTON') return;
    touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, {passive: false});
container.addEventListener('touchmove', (e) => {
    if(!gameActive || e.target.tagName === 'BUTTON') return;
    e.preventDefault(); 
    euler.setFromQuaternion(camera.quaternion);
    euler.y -= (e.touches[0].clientX - touchStartX) * 0.005; euler.x -= (e.touches[0].clientY - touchStartY) * 0.005;
    euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
    camera.quaternion.setFromEuler(euler);
    touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, {passive: false});

['w','a','s','d'].forEach(k => {
    const btn = document.getElementById('btn-'+k);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[k] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[k] = false; });
});
document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); if(gameActive) shoot(); });
document.addEventListener('mousedown', (e) => { if(gameActive && !isTouchDevice && e.button===0) shoot(); });

function checkCollision(nx, nz, radius=2) {
    for(let c of colliders) {
        if(c.type === 'box') {
            const h = c.size/2;
            if (nx + radius > c.x - h && nx - radius < c.x + h && nz + radius > c.z - h && nz - radius < c.z + h) return true;
        } else if(c.type === 'circle') {
            const dist = Math.hypot(nx - c.x, nz - c.z);
            if(dist < radius + c.radius) return true;
        }
    }
    return false;
}

const raycaster = new THREE.Raycaster();
function shoot() {
    const w = document.getElementById('weapon-container'), f = document.getElementById('flash');
    w.classList.add('firing'); f.style.background = 'rgba(255,255,0,0.3)'; f.style.display = 'block';
    setTimeout(() => { w.classList.remove('firing'); f.style.display = 'none'; }, 100);

    raycaster.setFromCamera(new THREE.Vector2(0,0), camera); 
    const targets = enemies.filter(e => e.active).map(e => e.mesh);
    const intersects = raycaster.intersectObjects(targets);
    
    if (intersects.length > 0) {
        const obj = enemies.find(e => e.mesh === intersects[0].object);
        if(obj) {
            obj.hp -= 50;
            if(obj.hp <= 0) { obj.active = false; scene.remove(obj.mesh); playerStats.score += 50; updateHUD(); }
        }
    }
}

function updateHUD() {
    document.getElementById('hp-display').innerText = playerStats.hp;
    document.getElementById('score-display').innerText = playerStats.score;
}

let clock = 0;
function gameLoop() {
    if (!gameActive) return;
    animationFrameId = requestAnimationFrame(gameLoop);
    clock += 0.05;

    // Movement
    velocity.set(0, 0, 0);
    if(keys.w) velocity.z -= 0.6; if(keys.s) velocity.z += 0.6;
    if(keys.a) velocity.x -= 0.6; if(keys.d) velocity.x += 0.6;
    velocity.applyQuaternion(camera.quaternion); velocity.y = 0; 
    
    if (velocity.length() > 0) {
        velocity.normalize().multiplyScalar(0.6);
        if(!checkCollision(camera.position.x + velocity.x, camera.position.z)) camera.position.x += velocity.x;
        if(!checkCollision(camera.position.x, camera.position.z + velocity.z)) camera.position.z += velocity.z;
    }

    // Item Collection (Bobbing + Distance Check)
    items.forEach(item => {
        if(!item.active) return;
        item.mesh.position.y = item.base_y + Math.sin(clock + item.mesh.position.x) * 0.5; // Bob
        if(camera.position.distanceTo(item.mesh.position) < 3.5) {
            item.active = false; scene.remove(item.mesh);
            if(item.type === 'hp') playerStats.hp = Math.min(100, playerStats.hp + item.value);
            if(item.type === 'score') playerStats.score += item.value;
            updateHUD();
            const f = document.getElementById('flash'); f.style.background = 'rgba(0,255,0,0.3)'; f.style.display = 'block';
            setTimeout(() => { f.style.display = 'none'; }, 100);
        }
    });

    // Win Check
    if(goalMesh && camera.position.distanceTo(goalMesh.position) < 5) {
        gameActive = false; if (document.pointerLockElement) document.exitPointerLock();
        document.getElementById('final-score').innerText = playerStats.score;
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('btn-pause').style.display = 'none';
        document.getElementById('mobile-controls').style.display = 'none';
    }

    // Enemy AI Check
    enemies.forEach(e => {
        if(!e.active) return;
        const dir = new THREE.Vector3().subVectors(camera.position, e.mesh.position); dir.y = 0; 
        if (dir.length() > 4) {
            dir.normalize();
            const nx = e.mesh.position.x + dir.x * e.speed;
            const nz = e.mesh.position.z + dir.z * e.speed;
            if(!checkCollision(nx, nz, 2)) { e.mesh.position.x = nx; e.mesh.position.z = nz; }
        } else if(Math.random() < 0.05) { 
            playerStats.hp -= 10; updateHUD();
            const f = document.getElementById('flash'); f.style.background = 'rgba(255,0,0,0.5)'; f.style.display = 'block';
            setTimeout(() => { f.style.display = 'none'; }, 100);
            if(playerStats.hp <= 0) {
                gameActive = false; if (document.pointerLockElement) document.exitPointerLock();
                document.getElementById('death-screen').style.display = 'flex';
                document.getElementById('btn-pause').style.display = 'none';
                document.getElementById('mobile-controls').style.display = 'none';
            }
        }
    });

    renderer.render(scene, camera);
}
