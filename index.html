<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Engine Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="unselectable">

    <!-- BOOT SCREEN -->
    <div id="boot-screen" class="fullscreen-overlay">
        <div class="bg-black/40 p-12 rounded-3xl border-4 border-white/10 backdrop-blur-xl">
            <h1 id="boot-title" class="title-text">RETRO ENGINE</h1>
            <p class="text-xl text-blue-200 mb-10 font-medium tracking-widest">CREATOR STUDIO</p>
            
            <div class="flex flex-col md:flex-row gap-8 justify-center">
                <button onclick="AudioEngine.resume(); playDemo();" class="bg-green-500 hover:bg-green-400 text-white px-10 py-5 rounded-2xl font-black text-3xl shadow-[0_8px_0_#15803d] active:translate-y-2 active:shadow-none transition-all flex items-center gap-3">
                    <span>►</span> PLAY GAME
                </button>
                <button onclick="AudioEngine.resume(); openEditor();" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-5 rounded-2xl font-black text-3xl shadow-[0_8px_0_#1d4ed8] active:translate-y-2 active:shadow-none transition-all flex items-center gap-3 border-2 border-white/20">
                    <span>⚙</span> BUILDER
                </button>
            </div>
        </div>
    </div>

    <!-- NEW EDITOR LAYOUT -->
    <div id="editor-sidebar" class="hidden">
        <div id="editor-layout">
            <!-- TOOLBAR (LEFT) -->
            <div id="toolbar">
                <div class="tool-btn active" title="Paint Entities" onclick="setLayer('entities')" id="btn-layer-entities">👾</div>
                <div class="tool-btn" title="Paint Floors" onclick="setLayer('floors')" id="btn-layer-floors">🧱</div>
                <div class="tool-btn" title="Paint Ceilings" onclick="setLayer('ceils')" id="btn-layer-ceils">🌌</div>
                <div class="h-px w-10 bg-gray-700 my-2"></div>
                <div class="tool-btn" title="Test Level" onclick="startGameEngine()" style="background: #22c55e;">►</div>
                <div class="tool-btn" title="Save Project" onclick="downloadGame()" style="background: #64748b;">💾</div>
                <div class="tool-btn" title="Open Project" onclick="document.getElementById('import-file').click()" style="background: #64748b;">📂</div>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importGame(event)">
            </div>

            <!-- MAIN CANVAS (CENTER) -->
            <div id="canvas-area">
                <div id="grid-header">
                    <div class="flex flex-col">
                        <span id="grid-label" class="text-xs font-bold text-blue-400 uppercase tracking-widest">Painting: Entities</span>
                        <span id="game-title-display" class="text-xl font-black text-white">My Retro Adventure</span>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="fillMap()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg font-bold text-sm">Fill Layer</button>
                        <button onclick="showProjectSettings()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg font-bold text-sm">Settings</button>
                    </div>
                </div>

                <div id="grid-container" class="grid"></div>
            </div>

            <!-- ASSET LIBRARY (RIGHT) -->
            <div id="asset-library">
                <div id="library-header">
                    <span>LIBRARY</span>
                    <button onclick="addNewAssetPrompt()" class="bg-blue-500 w-8 h-8 rounded-full flex items-center justify-center text-xl">+</button>
                </div>
                <div id="library-tabs">
                    <div class="lib-tab active" id="tab-ent" onclick="switchLibTab('entities')">ENTITIES</div>
                    <div class="lib-tab" id="tab-tile" onclick="switchLibTab('tiles')">TILES</div>
                </div>
                <div id="library-content">
                    <!-- Cards injected via JS -->
                </div>
            </div>
        </div>

        <!-- INSPECTOR (DRAWER) -->
        <div id="inspector">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                <h3 class="font-black text-blue-400 uppercase tracking-tighter">Properties</h3>
                <button onclick="closeInspector()" class="text-gray-400">✕</button>
            </div>
            <div id="inspector-fields">
                <!-- Fields injected via JS -->
            </div>
            <div class="mt-6 flex gap-2">
                <button onclick="deleteActiveAsset()" class="flex-1 bg-red-600 py-2 rounded-lg font-bold text-sm">Delete</button>
                <button onclick="closeInspector()" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold text-sm">Apply</button>
            </div>
        </div>
    </div>

    <!-- GAME VIEWPORT -->
    <div id="game-container">
        <div id="crosshair"></div>
        <div id="weapon-container"><img id="weapon-img" src="" alt="weapon"></div>
        
        <div id="hud">
            <div class="hud-item flex items-center gap-4">
                <span class="text-red-500 font-black text-2xl">HP</span>
                <span id="hp-display" class="text-white font-black text-3xl">100</span>
            </div>
            <div class="hud-item flex items-center gap-4">
                <span class="text-yellow-400 font-black text-2xl">SCORE</span>
                <span id="score-display" class="text-white font-black text-3xl">0</span>
            </div>
        </div>

        <div id="flash"></div>
        <button id="btn-pause" onclick="stopGame()" class="absolute top-6 right-6 bg-white/10 hover:bg-white/20 backdrop-blur-md border-2 border-white/20 text-white px-6 py-3 rounded-2xl font-black z-20 pointer-events-auto hidden unselectable">PAUSE (EXIT)</button>

        <div id="win-screen" class="fullscreen-overlay bg-green-900/90 backdrop-blur-md">
            <h1 class="title-text text-green-400">LEVEL CLEAR</h1>
            <p class="text-3xl text-yellow-400 mb-12 font-black">Score: <span id="final-score">0</span></p>
            <button onclick="stopGame()" class="bg-white text-green-900 px-12 py-5 rounded-2xl font-black text-2xl cursor-pointer pointer-events-auto">BACK TO HUB</button>
        </div>
        
        <div id="death-screen" class="fullscreen-overlay bg-red-950/90 backdrop-blur-md">
            <h1 class="title-text text-red-500">YOU DIED</h1>
            <button onclick="startGameEngine()" class="bg-red-600 text-white px-12 py-5 rounded-2xl font-black text-2xl mt-4 cursor-pointer pointer-events-auto border-4 border-red-400 shadow-[0_10px_0_#7f1d1d] active:translate-y-2 active:shadow-none">TRY AGAIN</button>
            <button onclick="stopGame()" class="mt-12 text-gray-400 underline cursor-pointer pointer-events-auto font-bold">RETURN TO BUILDER</button>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/state.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
