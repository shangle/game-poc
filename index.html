<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Engine Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col md:flex-row h-screen">

    <!-- BOOT SCREEN -->
    <div id="boot-screen" class="fullscreen-overlay">
        <div class="bg-black/60 p-12 rounded-2xl border-4 border-gray-700 backdrop-blur-sm">
            <h1 id="boot-title" class="title-text text-blue-400">RETRO ENGINE</h1>
            <p class="text-xl text-gray-300 mb-8 font-bold">Game Creator Studio & Player</p>
            
            <div class="flex flex-col md:flex-row gap-6 justify-center">
                <button onclick="playDemo()" class="bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-xl font-black text-2xl shadow-[0_6px_0_#166534] active:translate-y-[6px] active:shadow-none transition-all">
                    ► PLAY DEMO GAME
                </button>
                <button onclick="openEditor()" class="bg-gray-700 hover:bg-gray-600 text-white px-8 py-4 rounded-xl font-black text-2xl shadow-[0_6px_0_#374151] active:translate-y-[6px] active:shadow-none transition-all border-2 border-gray-500">
                    ⚙️ ENTER BUILDER
                </button>
            </div>
        </div>
    </div>

    <!-- EDITOR UI -->
    <div id="editor-sidebar" class="w-full md:w-[450px] h-screen bg-gray-900 border-r border-gray-700 flex flex-col z-40 hidden">
        <div class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">Engine Builder</h1>
            <button onclick="startGameEngine()" class="bg-green-600 hover:bg-green-500 px-4 py-1 rounded font-bold shadow">► TEST</button>
        </div>

        <div class="flex border-b border-gray-700 text-sm bg-gray-800">
            <button onclick="switchTab('map')" id="tab-map" class="flex-1 py-3 font-semibold tab-btn active">Map Editor</button>
            <button onclick="switchTab('assets')" id="tab-assets" class="flex-1 py-3 font-semibold tab-btn text-gray-400">Assets & DB</button>
            <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-3 font-semibold tab-btn text-gray-400">Project</button>
        </div>

        <!-- TAB: MAP -->
        <div id="content-map" class="p-4 flex-1 flex flex-col overflow-hidden">
            <!-- Layer Toggles -->
            <div class="flex gap-2 mb-3 bg-gray-800 p-2 rounded-lg justify-center">
                <button onclick="setLayer('entities')" id="btn-layer-entities" class="px-3 py-1 rounded font-bold text-xs bg-blue-600 text-white">Entities</button>
                <button onclick="setLayer('floors')" id="btn-layer-floors" class="px-3 py-1 rounded font-bold text-xs bg-gray-700 text-gray-300">Floors</button>
                <button onclick="setLayer('ceils')" id="btn-layer-ceils" class="px-3 py-1 rounded font-bold text-xs bg-gray-700 text-gray-300">Ceilings</button>
            </div>

            <div class="bg-gray-800 p-3 rounded-lg mb-3 shadow-inner min-h-[80px]">
                <h3 class="text-xs font-bold text-gray-400 mb-2" id="palette-title">Palette (Entities)</h3>
                <div id="palette-container" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="bg-gray-800 p-4 rounded-lg shadow-lg flex flex-col items-center flex-1 overflow-auto">
                <div class="w-full flex justify-between items-center mb-2">
                    <span class="text-sm font-bold text-gray-300" id="grid-label">Painting: Entities</span>
                    <button onclick="fillMap()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">Fill Layer</button>
                </div>
                <div id="grid-container" class="grid bg-gray-900 border-2 border-gray-700 touch-none mx-auto"></div>
            </div>
        </div>

        <!-- TAB: ASSETS DB -->
        <div id="content-assets" class="p-4 flex-1 hidden overflow-y-auto space-y-4">
            <p class="text-xs text-gray-400">Manage all unlimited custom types here.</p>
            
            <div id="db-categories" class="space-y-4 pb-10">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- TAB: SETTINGS -->
        <div id="content-settings" class="p-4 flex-1 hidden overflow-y-auto space-y-6">
            <div class="bg-gray-800 p-4 rounded-lg space-y-3">
                <h3 class="text-sm font-bold text-blue-400">Game Meta</h3>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">Game Title</label>
                    <input type="text" id="game-title-input" class="w-full bg-gray-700 rounded px-3 py-2 text-white font-bold" oninput="updateSettings()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">Start Screen URL</label>
                    <input type="text" id="game-start-bg" class="w-full bg-gray-700 rounded px-3 py-2 text-white placeholder-gray-500" placeholder="Background image URL" oninput="updateSettings()">
                </div>
            </div>

            <div class="bg-gray-800 p-4 rounded-lg space-y-3">
                <h3 class="text-sm font-bold text-green-400">Save & Share</h3>
                <button onclick="downloadGame()" class="w-full bg-gray-700 hover:bg-gray-600 p-3 rounded font-bold flex justify-center gap-2">💾 Save Project (.json)</button>
                <div class="relative">
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importGame(event)">
                    <button onclick="document.getElementById('import-file').click()" class="w-full bg-gray-700 hover:bg-gray-600 p-3 rounded font-bold flex justify-center gap-2">📂 Open Project</button>
                </div>
                <button onclick="generateShareURL()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded font-bold flex justify-center gap-2 mt-2">🔗 Copy Playable Link</button>
                <p id="share-feedback" class="text-green-400 text-xs font-bold text-center hidden">Copied to Clipboard!</p>
            </div>
        </div>
    </div>

    <!-- GAME VIEWPORT -->
    <div id="game-container">
        <div id="crosshair"></div>
        <div id="weapon-container"><img id="weapon-img" src="" alt="weapon"></div>
        <div id="hud">
            <div class="text-red-500">HP: <span id="hp-display">100</span></div>
            <div class="text-yellow-400 text-lg">SCORE: <span id="score-display">0</span></div>
        </div>
        <div id="flash"></div>

        <div id="mobile-controls" class="absolute bottom-6 left-2 right-6 z-20 pointer-events-none unselectable">
            <div class="flex justify-between items-end w-full h-full">
                <div class="grid grid-cols-3 gap-1 pointer-events-auto opacity-70">
                    <div></div><button id="btn-w" class="w-14 h-14 bg-gray-700 rounded-lg active:bg-gray-500 text-white font-bold text-2xl pb-1">↑</button><div></div>
                    <button id="btn-a" class="w-14 h-14 bg-gray-700 rounded-lg active:bg-gray-500 text-white font-bold text-2xl pr-1">←</button>
                    <button id="btn-s" class="w-14 h-14 bg-gray-700 rounded-lg active:bg-gray-500 text-white font-bold text-2xl pt-1">↓</button>
                    <button id="btn-d" class="w-14 h-14 bg-gray-700 rounded-lg active:bg-gray-500 text-white font-bold text-2xl pl-1">→</button>
                </div>
                <button id="btn-fire" class="w-20 h-20 bg-red-600/80 rounded-full active:bg-red-400 text-white font-bold pointer-events-auto border-4 border-red-800 shadow-lg mb-2">FIRE</button>
            </div>
        </div>
        
        <button id="btn-pause" onclick="stopGame()" class="absolute top-4 right-4 bg-gray-800 border-2 border-gray-600 text-white px-4 py-2 rounded font-bold z-20 pointer-events-auto hidden unselectable">EDIT (PAUSE)</button>

        <div id="win-screen" class="fullscreen-overlay">
            <h1 class="title-text text-green-400">LEVEL CLEAR</h1>
            <p class="text-2xl text-yellow-400 mb-8 font-bold">Final Score: <span id="final-score">0</span></p>
            <button onclick="stopGame()" class="bg-white text-green-900 px-8 py-4 rounded-xl font-bold cursor-pointer pointer-events-auto text-xl">Back to Menu</button>
        </div>
        
        <div id="death-screen" class="fullscreen-overlay">
            <h1 class="title-text text-red-500">YOU DIED</h1>
            <button onclick="startGameEngine()" class="bg-red-700 text-white px-8 py-4 rounded-xl font-bold mt-4 cursor-pointer pointer-events-auto border-2 border-red-400 text-xl shadow-[0_6px_0_#7f1d1d] active:translate-y-[6px] active:shadow-none">Try Again</button>
            <button onclick="stopGame()" class="mt-8 text-sm text-gray-400 underline cursor-pointer pointer-events-auto">Return to Builder</button>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
